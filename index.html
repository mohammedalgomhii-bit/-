<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطاعم الكورنيش VIP - نظام ذكي</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f6; margin: 0; height: 100dvh; overflow: hidden; }
        .app-container { height: 100%; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: white; position: relative; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .bot-bubble { background: white; border: 1px solid #efefef; border-radius: 18px 18px 18px 2px; padding: 12px 16px; max-width: 85%; align-self: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.02); color: #333; font-size: 14px; }
        .user-bubble { background: #0056b3; color: white; border-radius: 18px 18px 2px 18px; padding: 12px 16px; max-width: 85%; align-self: flex-end; box-shadow: 0 4px 12px rgba(0,86,179,0.15); font-size: 14px; }
        .input-section { padding: 12px; border-top: 1px solid #eee; background: white; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        .input-wrapper { display: flex; align-items: center; background: #f1f3f5; border-radius: 25px; padding: 5px 15px; border: 1px solid #e9ecef; }
        input { flex: 1; background: transparent; border: none; outline: none; padding: 10px 0; font-size: 16px; color: #333; }
        .send-btn { color: #0056b3; cursor: pointer; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function CornicheBot() {
            const API_URL = "https://sheetdb.io/api/v1/8ku63b4j58gja";
            const [inputValue, setInputValue] = useState("");
            const [messages, setMessages] = useState([{ 
                role: 'bot', 
                text: "مرحباً بكم في وحدة كبار العملاء بمطاعم الكورنيش السياحية. نتشرف بخدمتكم.\nيرجى تزويدنا بالاسم الثنائي ورقم التواصل والموقع للبدء." 
            }]);
            const [data, setData] = useState({ name: "", phone: "", location: "", order: "" });
            const [step, setStep] = useState("get_info");
            const chatEndRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const checkHistory = async (phone) => {
                try {
                    const res = await fetch(`${API_URL}/search?phone=${phone}`);
                    const result = await res.json();
                    return result.length > 0 ? result[result.length - 1] : null;
                } catch (e) { return null; }
            };

            const handleSend = async () => {
                const text = inputValue.trim();
                if (!text) return;

                setMessages(prev => [...prev, { role: 'user', text }]);
                setInputValue("");

                setTimeout(async () => {
                    let response = "";
                    let nextStep = step;

                    if (step === "get_info") {
                        const phoneMatch = text.match(/(77|78|73)\d{7,}/);
                        const words = text.replace(/[0-9]/g, '').trim().split(/\s+/);
                        
                        let updated = { ...data };
                        if (phoneMatch) updated.phone = phoneMatch[0];
                        if (words.length >= 2) updated.name = words.slice(0, 2).join(" ");
                        if (text.length > 5 && !phoneMatch) updated.location = text;
                        setData(updated);

                        if (!updated.name) {
                            response = "نرجو من سيادتكم كتابة الاسم الثنائي (الأول والأخير) لضمان جودة الخدمة.";
                        } else if (!updated.phone) {
                            response = `أهلاً بك يا سيد ${updated.name}، يرجى تزويدنا برقم الهاتف (77، 78، أو 73).`;
                        } else {
                            // فحص العميل السابق
                            const history = await checkHistory(updated.phone);
                            if (history && !updated.location) {
                                response = `أهلاً بك مجدداً يا ${updated.name}! نورتنا من جديد.\nطلبك السابق كان: (${history.order || history.items})\n\nهل ترغب بتكرار نفس الطلب أم تريد طلباً جديداً؟`;
                                updated.location = history.location; // استرجاع الموقع تلقائياً
                                setData(updated);
                                nextStep = "history_choice";
                            } else if (!updated.location) {
                                response = "يرجى تحديد موقع الكيان الموقر (المدينة - الحي - الشارع).";
                            } else {
                                response = "تم استلام بياناتك بنجاح. تفضل بكتابة طلبك الآن وفق النموذج:\n(الوجبات، السلطات، المشروبات، الملاحظات)";
                                nextStep = "order";
                            }
                        }
                    } else if (step === "history_choice") {
                        if (text.includes("نفس") || text.includes("نعم") || text.includes("كرر")) {
                            const lastOrder = await checkHistory(data.phone);
                            setData(p => ({...p, order: lastOrder.order || lastOrder.items}));
                            response = `تم اختيار طلبك السابق:\n"${lastOrder.order || lastOrder.items}"\n\nهل نؤكد الطلب؟ (تأكيد / تعديل)`;
                            nextStep = "confirm";
                        } else {
                            response = "حاضر، تفضل بكتابة طلبك الجديد بالتفصيل:";
                            nextStep = "order";
                        }
                    } else if (step === "order") {
                        setData(p => ({...p, order: text}));
                        response = `طلبك المسجل هو:\n"${text}"\n\nهل نؤكد الطلب؟ (تأكيد / تعديل)`;
                        nextStep = "confirm";
                    } else if (step === "confirm") {
                        if (text.includes("تأكيد") || text.includes("نعم") || text.includes("أكد") || text.includes("تم")) {
                            response = "تم إرسال طلبك بنجاح! سيتم التواصل معك قريباً من قبل خدمة العملاء.\nشكراً لتواصلك معنا.";
                            await fetch(API_URL, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({data: [{...data, timestamp: new Date().toLocaleString()}]})
                            });
                            nextStep = "end";
                        } else {
                            response = "يرجى إرسال التعديل المطلوب على الطلب:";
                            nextStep = "order";
                        }
                    }

                    setMessages(prev => [...prev, { role: 'bot', text: response }]);
                    setStep(nextStep);
                }, 600);
            };

            return (
                <div className="app-container shadow-xl">
                    <header className="p-4 border-b text-center bg-white shrink-0 shadow-sm z-10">
                        <h1 className="text-[#0056b3] font-bold text-lg">مطاعم الكورنيش <span className="text-[#ff7f27]">VIP</span></h1>
                        <p className="text-[10px] text-gray-400">نظام الرد الذكي المطور</p>
                    </header>

                    <div className="chat-area">
                        {messages.map((m, i) => (
                            <div key={i} className={m.role === 'user' ? 'user-bubble' : 'bot-bubble'}>
                                {m.text.split('\n').map((l, j) => <p key={j} className="mb-1 leading-relaxed">{l}</p>)}
                            </div>
                        ))}
                        <div ref={chatEndRef} />
                    </div>

                    <div className="input-section">
                        <div className="input-wrapper">
                            <input 
                                type="text"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                onKeyDown={(e) => {
                                    if (e.key === 'Enter') {
                                        e.preventDefault();
                                        handleSend();
                                    }
                                    // زر المسافة يعمل بشكل طبيعي الآن ولن يرسل النص
                                }}
                                placeholder="اكتب هنا..."
                            />
                            <div className="send-btn" onClick={handleSend}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CornicheBot />);
    </script>
</body>
</html>
