<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطاعم الكورنيش السياحية - خدمة العملاء</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean-blue: #004D99;
            --soft-blue: #F0F7FF;
            --sand-orange: #FF9933;
            --shadow-subtle: 0 10px 30px rgba(0, 0, 0, 0.04);
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--soft-blue); height: 100vh; margin: 0; }
        .vip-container { background: #FFFFFF; border-radius: 30px; box-shadow: var(--shadow-subtle); border: 1px solid rgba(0, 77, 153, 0.05); overflow: hidden; }
        .vip-header { background: linear-gradient(135deg, #004D99 0%, #005BB8 100%); border-bottom: 3px solid var(--sand-orange); }
        .orange-accent { color: var(--sand-orange); }
        .bot-bubble { background: #F8FAFC; border: 1px solid #EDF2F7; color: #2D3748; }
        .user-bubble { background: linear-gradient(135deg, #FF9933 0%, #FFB366 100%); color: #FFFFFF; box-shadow: 0 4px 15px rgba(255, 153, 51, 0.2); }
        .chat-scroll::-webkit-scrollbar { width: 3px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: var(--sand-orange); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function CornicheFullSystem() {
            const [input, setInput] = useState("");
            const [step, setStep] = useState("ask_name"); // خطوات المحادثة
            const [userData, setUserData] = useState({ name: "", phone: "", request: "" });
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'مرحباً بكم في وحدة كبار العملاء بمطاعم الكورنيش السياحية. نتشرف بخدمتكم.' },
                { role: 'bot', text: 'للبدء، نتشرف بمعرفة اسمك الكريم؟' }
            ]);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleSend = () => {
                const text = input.trim();
                if (!text) return;

                setMessages(prev => [...prev, { role: 'user', text: text }]);
                setInput("");

                setTimeout(() => {
                    let response = "";
                    
                    if (step === "ask_name") {
                        setUserData(prev => ({ ...prev, name: text }));
                        response = `والنعم بك أستاذ ${text}. الآن، فضلاً زوّدنا برقم جوالك للتواصل؟`;
                        setStep("ask_phone");
                    } 
                    else if (step === "ask_phone") {
                        setUserData(prev => ({ ...prev, phone: text }));
                        response = `شكراً لك. كيف يمكننا خدمتك اليوم؟ (تستطيع ذكر تفاصيل طلبك، أو قل "نفس دايم"، "على ذوقكم" .. إلخ)`;
                        setStep("ask_request");
                    } 
                    else if (step === "ask_request") {
                        setUserData(prev => ({ ...prev, request: text }));
                        
                        // معالجة الدلائل السياقية في الطلب
                        const t = text.toLowerCase();
                        if (t.includes("بكرة") || t.includes("غدا")) {
                            response = "تم تثبيت الموعد ليوم غدٍ. نعدكم بالدقة والتميز.";
                        } else if (t.includes("وجبة واحدة")) {
                            response = "أهلاً بك؛ تم تبسيط الإجراءات لطلبك الفردي الآن.";
                        } else if (t.includes("نفس") || t.includes("الماضية")) {
                            response = "بكل سرور، سنقوم بتحضير طلبك المعتاد فوراً.";
                        } else if (t.includes("ذوقكم") || t.includes("شي خفيف")) {
                            response = "اختيار موفق؛ سأختار لك طبق 'توقيع الشيف' الفاخر.";
                        } else if (t.includes("ما قصرتوا") || t.includes("شكرا")) {
                            response = "هذا واجبنا وفخر لنا؛ ننتظر تشريفكم لنا دائماً.";
                        } else {
                            response = "تم استلام تفاصيل طلبكم. سيقوم فريق خدمة العملاء بالتنفيذ فوراً.";
                        }
                    }

                    setMessages(prev => [...prev, { role: 'bot', text: response }]);
                }, 600);
            };

            return (
                <div className="w-full max-w-2xl mx-auto h-screen flex flex-col p-4 md:p-8">
                    <div className="flex-1 vip-container flex flex-col">
                        
                        <header className="vip-header px-8 py-7 text-white flex justify-between items-center">
                            <div>
                                <h1 className="text-lg font-bold leading-tight">مطاعم الكورنيش السياحية</h1>
                                <p className="text-[11px] opacity-80 mt-1">نظام الرد الآلي لخدمة العملاء</p>
                            </div>
                            <div className="text-xl font-black italic tracking-tighter orange-accent bg-white/10 px-3 py-1 rounded-lg border border-white/10">
                                VIP
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 space-y-6 chat-scroll bg-white">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-start' : 'justify-end'}`}>
                                    <div className={`max-w-[85%] p-5 rounded-[22px] text-[15px] shadow-sm leading-relaxed ${
                                        m.role === 'user' ? 'user-bubble rounded-bl-none' : 'bot-bubble rounded-br-none'
                                    }`}>
                                        {m.text}
                                    </div>
                                </div>
                            ))}
                            <div ref={chatEndRef} />
                        </div>

                        <div className="p-6 bg-gray-50/50 border-t border-gray-100">
                            <div className="flex items-center gap-3">
                                <input 
                                    type="text" 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder={step === "ask_name" ? "اكتب اسمك هنا..." : step === "ask_phone" ? "اكتب رقم الجوال..." : "اكتب طلبك هنا..."}
                                    className="flex-1 p-4 bg-white border border-gray-200 rounded-2xl outline-none focus:border-[#004D99] transition-all shadow-sm"
                                    onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                />
                                <button onClick={handleSend} className="p-4 bg-[#004D99] text-white rounded-2xl hover:bg-[#003D7A] transition-all shadow-lg">
                                    ➤
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CornicheFullSystem />);
    </script>
</body>
</html>
