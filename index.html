<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطاعم الكورنيش VIP - نظام التنسيق</title>
    <!-- React و Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- خط Tajawal -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0056b3;
            --primary-orange: #ff7f27;
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #f8f9fa; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
        }
        /* إخفاء شريط التمرير */
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        /* رسائل المستخدم والبوت */
        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14px; 
            line-height: 1.6; 
            animation: slideIn 0.3s ease-out; 
            word-wrap: break-word;
        }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .bot-msg { 
            align-self: flex-start; 
            background: #f1f5f9; 
            color: #1e293b; 
            border-bottom-right-radius: 2px; 
            border-right: 4px solid var(--primary-blue); 
        }
        .user-msg { 
            align-self: flex-end; 
            background: var(--primary-blue); 
            color: white; 
            border-bottom-left-radius: 2px; 
        }

        /* حاوية التطبيق للجوال */
        .app-container { 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            max-width: 500px; 
            margin: 0 auto; 
            background: #ffffff; 
            position: relative; 
            box-shadow: 0 0 40px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // مكون الرسالة المنفصل
        const Message = ({ role, text }) => (
            <div className={`msg ${role === 'bot' ? 'bot-msg' : 'user-msg'}`}>
                {text.split('\n').map((line, j) => (
                    <p key={j} className="mb-1 last:mb-0">
                        {line.includes('http') ? (
                            <a href="https://labbayh.com" target="_blank" rel="noreferrer" className="text-white underline font-bold">
                                رابط تطبيق لبيه
                            </a>
                        ) : line}
                    </p>
                ))}
            </div>
        );

        const App = () => {
            const API_URL = "https://sheetdb.io/api/v1/8ku63b4j58gja";
            
            // حالة الرسائل الأولية
            const [messages, setMessages] = useState([
                { role: 'bot', text: "مرحباً بكم في وحدة كبار العملاء (VIP) بمطاعم الكورنيش السياحية.\nنتشرف بخدمتكم لتنسيق أرقى المناسبات وعقود التغذية.\n\nتفضل بتزويدنا بالاسم الثنائي لسيادتكم؟" }
            ]);
            
            // كائن الطلب (بدون صورة)
            const [order, setOrder] = useState({
                name: "", phone: "", location: "", date: "", 
                type: "", quantity: "", details: "", timestamp: ""
            });

            const [step, setStep] = useState(1);
            const [input, setInput] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const chatRef = useRef(null);
            const textareaRef = useRef(null);

            // تمرير تلقائي للأسفل
            useEffect(() => { 
                if (chatRef.current) {
                    chatRef.current.scrollTop = chatRef.current.scrollHeight;
                }
            }, [messages]);

            // توسيع النص تلقائياً
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 100) + 'px';
                }
            }, [input]);

            const submitToSheet = async (finalData) => {
                setIsLoading(true);
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ 
                            data: [{
                                name: finalData.name,
                                phone: finalData.phone,
                                location: finalData.location,
                                date: finalData.date,
                                type: finalData.type,
                                quantity: finalData.quantity,
                                details: finalData.details,
                                timestamp: new Date().toLocaleString('ar-YE')
                                // تم إزالة حقل الصورة تماماً
                            }] 
                        })
                    });
                    
                    if(response.ok) {
                        setMessages(prev => [...prev, { role: 'bot', text: "تم تسجيل كافة بياناتكم بنجاح في سجلاتنا.\nسيقوم فريق التنسيق بمراجعة الطلب والتواصل معكم فوراً.\n\nشكراً لثقتكم بمطاعم الكورنيش." }]);
                    } else { throw new Error(); }
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'bot', text: "تم استلام طلبكم، وسنقوم بالتواصل معكم هاتفياً لتأكيد التفاصيل النهائية." }]);
                }
                setIsLoading(false);
                setStep(100);
            };

            const handleSend = () => {
                const text = input.trim();
                if (!text || isLoading) return;

                setMessages(prev => [...prev, { role: 'user', text }]);
                setInput("");

                setTimeout(() => {
                    let botText = "";
                    let nextStep = step;
                    let updatedOrder = { ...order };

                    switch(step) {
                        case 1: // الاسم
                            if(text.split(" ").length < 2) {
                                botText = "نرجو تزويدنا بالاسم الثنائي الموقر للمتابعة؟";
                            } else {
                                updatedOrder.name = text;
                                botText = "تشرفنا بك. يرجى تزويدنا برقم الهاتف المعتمد لسيادتكم؟";
                                nextStep = 2;
                            }
                            break;
                        case 2: // الهاتف
                            if(!/^\d{7,}$/.test(text.replace(/\s/g, ""))) {
                                botText = "يرجى كتابة رقم هاتف صحيح لنتمكن من التواصل معكم؟";
                            } else {
                                updatedOrder.phone = text;
                                botText = "نرجو تحديد موقع المناسبة بدقة (3 أركان: المدينة - الحي - الشارع/المعلم)؟\nمثال: المكلا - الشرج - مقابل البسيري";
                                nextStep = 3;
                            }
                            break;
                        case 3: // الموقع
                            const locationParts = text.split(/[-ـ\s\.]+/).filter(p => p.length > 1);
                            if(locationParts.length < 3) {
                                botText = "عذراً، يجب وصف الموقع بـ 3 أركان على الأقل (مثال: المكلا - الشرج - بجانب مدرسة...) لضمان دقة الوصول؟";
                            } else {
                                updatedOrder.location = text;
                                botText = "هل الطلب خاص بمناسبة (زواج، اجتماع، عقد تغذية) أم طلب شخصي؟";
                                nextStep = 4;
                            }
                            break;
                        case 4: // النوع
                            if(text.includes("شخصي") || text.includes("فردي")) {
                                botText = "عذراً سيد " + updatedOrder.name + "، هذا القسم مخصص للمناسبات الكبرى فقط. للطلبات الشخصية يرجى استخدام تطبيق (لبيه).\nhttps://labbayh.com";
                                setMessages(prev => [...prev, { role: 'bot', text: botText }]);
                                setStep(100);
                                return;
                            } else {
                                updatedOrder.type = text;
                                botText = "تفضل بوصف الأصناف المطلوبة لمناسبتكم الموقرة؟";
                                nextStep = 5;
                            }
                            break;
                        case 5: // التفاصيل
                            updatedOrder.details = text;
                            botText = "ما هي الكمية الإجمالية التقديرية (عدد الوجبات أو المعازيم)؟";
                            nextStep = 6;
                        break;
                        case 6: // الكمية
                            updatedOrder.quantity = text;
                            botText = "يرجى تحديد تاريخ المناسبة.\nنرجو كتابته بهذا الشكل: 20/10/2026";
                            nextStep = 7;
                        break;
                        case 7: // التاريخ النهائي
                            if(!text.includes("/")) {
                                botText = "يرجى كتابة التاريخ بشكل صحيح مثل النموذج: 20/10/2026";
                            } else {
                                updatedOrder.date = text;
                                setOrder(updatedOrder);
                                submitToSheet(updatedOrder);
                                return;
                            }
                        break;
                    }

                    setOrder(updatedOrder);
                    setStep(nextStep);
                    if(botText) {
                        setMessages(prev => [...prev, { role: 'bot', text: botText }]);
                    }
                }, 400);
            };

            return (
                <div className="app-container">
                    {/* شاشة التحميل */}
                    {isLoading && (
                        <div className="absolute inset-0 bg-white/90 z-50 flex flex-col items-center justify-center text-center p-5">
                            <div className="w-9 h-9 border-4 border-slate-200 border-t-[#ff7f27] rounded-full animate-spin"></div>
                            <p className="mt-4 text-blue-900 font-bold">جاري تأمين وحفظ البيانات...</p>
                        </div>
                    )}
                    
                    {/* الهيدر */}
                    <header className="bg-white p-5 text-center border-b-4 border-[#ff7f27] shadow-sm">
                        <div className="text-[#0056b3] font-extrabold text-xl">مطاعم الكورنيش السياحية</div>
                        <div className="text-[#ff7f27] text-xs font-bold mt-1 tracking-widest">وحدة كبار العملاء VIP</div>
                    </header>

                    {/* منطقة المحادثة */}
                    <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3 bg-[#fdfdfd]" ref={chatRef}>
                        {messages.map((m, i) => (
                            <Message key={i} role={m.role} text={m.text} />
                        ))}
                    </div>

                    {/* منطقة الإدخال */}
                    {step !== 100 && (
                        <div className="p-3 bg-white border-t border-gray-100 pb-[max(15px,env(safe-area-inset-bottom))]">
                            <div className="flex items-center bg-[#f1f5f9] rounded-full px-4 py-1 border-2 border-transparent focus-within:border-[#0056b3] focus-within:bg-white transition-all shadow-sm">
                                <textarea 
                                    ref={textareaRef}
                                    rows="1" 
                                    placeholder="اكتب ردكم هنا..." 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            handleSend();
                                        }
                                    }}
                                    className="flex-1 bg-transparent border-none outline-none p-2 text-[15px] text-slate-700 resize-none font-tajawal"
                                />
                                <div className="text-[#0056b3] cursor-pointer p-1.5 hover:opacity-80 transition-opacity" onClick={handleSend}>
                                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
