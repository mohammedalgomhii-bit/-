<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطاعم الكورنيش - نظام VIP المطور</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-white: #FFFFFF; --s-gray: #F8FAFC; --b-orange: #FF782D; --b-blue: #0056D2; }
        body { font-family: 'Tajawal', sans-serif; background: #F0F4F8; height: 100vh; margin: 0; }
        .main-card { background: var(--p-white); border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid #E2E8F0; }
        .header-ui { background: white; border-bottom: 3px solid var(--s-gray); position: relative; }
        .header-ui::after { content: ''; position: absolute; bottom: -3px; left: 0; width: 30%; height: 3px; background: var(--b-orange); }
        .header-ui::before { content: ''; position: absolute; bottom: -3px; right: 0; width: 70%; height: 3px; background: var(--b-blue); }
        .bot-msg { background: white; border-right: 4px solid var(--b-blue); shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .user-msg { background: var(--b-blue); color: white; shadow: 0 4px 12px rgba(0, 86, 210, 0.15); }
        .orange-send { background: var(--b-orange); transition: all 0.2s; cursor: pointer; }
        .orange-send:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 120, 45, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function CornicheVIPApp() {
            const [input, setInput] = useState("");
            const [step, setStep] = useState("welcome");
            // استخدام useRef للبيانات لضمان توفرها فوراً عند الإرسال دون انتظار الـ State
            const collectedData = useRef({ name: "", phone: "", type: "", details: "", date: "" });
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'مرحباً بك في مطاعم الكورنيش السياحية.\nيرجى تسجيل اسمك الثنائي أو اسم المؤسسة للمتابعة:' }
            ]);
            const scrollRef = useRef(null);

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const addMsg = (role, text) => setMessages(prev => [...prev, { role, text }]);

            const handleSend = async () => {
                const val = input.trim();
                if (!val) return;

                addMsg('user', val);
                setInput("");

                let nextReply = "";
                
                if (step === "welcome") {
                    const isDouble = val.split(/\s+/).filter(s => s).length >= 2;
                    const isOrg = ["شركة", "مستشفى", "مدرسة", "جمعية", "مؤسسة"].some(o => val.includes(o));
                    if (isDouble || isOrg) {
                        collectedData.current.name = val;
                        nextReply = "شكراً لك. يرجى إدخال رقم هاتفك (9 أرقام يبدأ بـ 77، 78، أو 73):";
                        setStep("phone");
                    } else {
                        nextReply = "نعتذر منك، يجب كتابة الاسم الثنائي (اسمان على الأقل) أو اسم المؤسسة للمتابعة:";
                    }
                } 
                
                else if (step === "phone") {
                    if (/^(77|78|73)\d{7}$/.test(val)) {
                        collectedData.current.phone = val;
                        nextReply = "هل طلبك بخصوص:\n1. مناسبة\n2. طلب عقد تغذية\n3. طلب شخصي";
                        setStep("type");
                    } else {
                        nextReply = "الرقم غير صحيح. اكتب الرقم الذي يبدأ بـ 77 - 78 - 73 ومكون من 9 أرقام:";
                    }
                }

                else if (step === "type") {
                    if (val.includes("شخصي") || val === "3") {
                        nextReply = "للطلبات الشخصية، يرجى التوجه لتطبيق لبيه:\nhttps://play.google.com/store/apps/details?id=com.techsoft.daily_dish_app";
                        setStep("welcome");
                    } else {
                        collectedData.current.type = val;
                        nextReply = "يرجى تزويدنا بالتفاصيل:\nالوجبات والكمية:\nالمشروبات والكمية:\nالسلطات والكمية:\nالتحلية والكمية:\nملاحظات:";
                        setStep("details");
                    }
                }

                else if (step === "details") {
                    collectedData.current.details = val;
                    nextReply = "متى موعد المناسبة؟ يرجى كتابة التاريخ هكذا (مثال: 10/7/2026):";
                    setStep("date");
                }

                else if (step === "date") {
                    collectedData.current.date = val;
                    addMsg('bot', "جاري تسجيل طلبك الـ VIP بالكامل... ✨");
                    
                    try {
                        const response = await fetch("https://sheetdb.io/api/v1/8ku63b4j58gja", {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                data: [{
                                    name: collectedData.current.name,
                                    phone: collectedData.current.phone,
                                    type: collectedData.current.type,
                                    details: collectedData.current.details,
                                    date: collectedData.current.date,
                                    timestamp: new Date().toLocaleString('ar-EG')
                                }]
                            })
                        });

                        if (response.ok) {
                            nextReply = "✅ تم تسجيل كافة بياناتك بنجاح في مطاعم الكورنيش. سنتواصل معك قريباً.";
                        } else {
                            nextReply = "تم استلام الطلب، سيقوم القسم المختص بمراجعته قريباً.";
                        }
                    } catch (e) {
                        nextReply = "شكراً لك، تم حفظ طلبك وسنتواصل معك فوراً.";
                    }
                    setStep("welcome");
                }

                setTimeout(() => addMsg('bot', nextReply), 600);
            };

            return (
                <div className="max-w-xl mx-auto h-screen flex flex-col p-4">
                    <div className="main-card flex-1 flex flex-col">
                        <header className="header-ui p-6 text-center">
                            <h1 className="text-2xl font-bold text-slate-800">مطاعم الكورنيش السياحية</h1>
                            <p className="text-blue-600 text-xs font-bold mt-1 tracking-widest">الرد الآلي لخدمة العملاء VIP</p>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-[#F8FAFC]">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`p-4 rounded-2xl max-w-[85%] whitespace-pre-line text-sm leading-relaxed shadow-sm ${
                                        m.role === 'user' ? 'user-msg' : 'bot-msg text-slate-700'
                                    }`}>
                                        {m.text}
                                    </div>
                                </div>
                            ))}
                            <div ref={scrollRef} />
                        </div>

                        <div className="p-5 bg-white border-t border-slate-100 flex flex-col gap-3">
                            <textarea 
                                className="w-full border border-slate-200 rounded-2xl p-4 outline-none focus:border-blue-500 transition-all text-sm resize-none h-24 bg-slate-50"
                                placeholder="اكتب ردك هنا... (اضغط Enter للسطر الجديد)"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                            />
                            <button 
                                onClick={handleSend}
                                className="orange-send text-white py-4 rounded-2xl font-bold text-sm shadow-lg"
                            >
                                إرسال الطلب الآن ➤
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CornicheVIPApp />);
    </script>
</body>
</html>
