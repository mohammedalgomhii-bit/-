<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطاعم الكورنيش VIP - النظام الصارم</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #fcfcfc; margin: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        .app-container { height: 100%; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: white; width: 100%; position: relative; border-left: 1px solid #eee; border-right: 1px solid #eee; }
        
        /* بار علوي ثابت برؤية واضحة */
        header { flex-shrink: 0; background: white; border-bottom: 2px solid #f8f8f8; padding: 15px; text-align: center; z-index: 100; }
        
        /* منطقة الرسائل مع ظلال مريحة للعين */
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #fafafa; display: flex; flex-direction: column; gap: 12px; }
        .bot-bubble { background: white; border: 1px solid #f0f0f0; border-radius: 15px 15px 15px 2px; padding: 12px; max-width: 85%; align-self: flex-start; box-shadow: 4px 4px 15px rgba(0,0,0,0.02); color: #333; font-size: 14px; line-height: 1.6; border-right: 4px solid #ff7f27; }
        .user-bubble { background: #0056b3; color: white; border-radius: 15px 15px 2px 15px; padding: 12px; max-width: 85%; align-self: flex-end; font-size: 14px; box-shadow: 0 4px 12px rgba(0,86,179,0.15); }

        /* منطقة الإدخال التفاعلية */
        .input-section { padding: 10px 15px; border-top: 1px solid #eee; background: white; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        .input-wrapper { display: flex; align-items: flex-end; background: #f1f3f5; border-radius: 20px; padding: 8px 12px; border: 1px solid #e9ecef; }
        textarea { flex: 1; background: transparent; border: none; outline: none; padding: 5px 0; font-size: 16px; color: #333; resize: none; max-height: 150px; min-height: 24px; line-height: 1.5; text-align: right; }
        .send-btn { color: #0056b3; cursor: pointer; padding: 5px; margin-right: 5px; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function CornicheBot() {
            const API_URL = "https://sheetdb.io/api/v1/8ku63b4j58gja";
            const [inputValue, setInputValue] = useState("");
            const [messages, setMessages] = useState([{ 
                role: 'bot', 
                text: "مرحباً بكم في وحدة كبار العملاء بمطاعم الكورنيش السياحية. نتشرف بخدمتكم.\n\nللشروع في تنسيق طلب سيادتكم، يرجى تزويدنا بالاسم الثنائي الموقر، ورقم التواصل، وتحديد موقع الكيان بدقة." 
            }]);
            const [data, setData] = useState({ name: "", phone: "", location: "", order: "" });
            const [step, setStep] = useState("get_info");
            const chatEndRef = useRef(null);
            const inputRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
            
            // ضبط ارتفاع التكست أريا تلقائياً (لسطر جديد)
            useEffect(() => {
                inputRef.current.style.height = "24px";
                inputRef.current.style.height = inputRef.current.scrollHeight + "px";
            }, [inputValue]);

            const handleSend = async () => {
                const text = inputValue.trim();
                if (!text) return;
                setMessages(prev => [...prev, { role: 'user', text }]);
                setInputValue("");

                setTimeout(async () => {
                    let response = "";
                    let nextStep = step;

                    // --- استخراج البيانات (الاسم، الرقم، الموقع) بشكل مستمر ---
                    const phoneMatch = text.match(/(77|78|73)\d{7,}/);
                    const words = text.replace(/[0-9]/g, '').trim().split(/\s+/);
                    let updated = { ...data };
                    
                    if (phoneMatch) updated.phone = phoneMatch[0];
                    if (words.length >= 2 && !updated.name) updated.name = words.slice(0, 2).join(" ");
                    if (text.length > 5 && !phoneMatch) {
                        if (text.includes("-") || words.length > 3) updated.location = text;
                    }
                    setData(updated);

                    // --- سياسة عدم التجاوز (المحرمات) ---
                    if (step === "get_info") {
                        if (!updated.name) {
                            response = "نعتذر من سيادتكم، هذا القسم مخصص لطلبات كبار العملاء فقط. يرجى تزويدنا بالاسم الثنائي الموقر أولاً لنبدأ التنسيق.";
                        } else if (!updated.phone) {
                            response = `أهلاً بك يا سيد ${updated.name}. نرجو تزويدنا برقم الهاتف (77، 78، أو 73) لاعتماد ملف سيادتكم.`;
                        } else if (!updated.location) {
                            response = "يرجى تحديد موقع الكيان الموقر (المدينة - الحي - الشارع) لضمان دقة التوصيل.";
                        } else {
                            response = `تم اعتماد بيانات سيادتكم بنجاح.\nتفضل الآن بكتابة طلبكم الموقر مع الالتزام بتوضيح (اسم الصنف + الكمية بالأرقام) وفق النموذج:\n\nالوجبة 1:\nكمية الوجبة 1:\nوجبة 2:\nكمية وجبة 2:\nسلطات (الاسم):\nكمية السلطات:\nالمشروبات (الاسم):\nكمية المشروبات:\nالتحلية (الاسم):\nكمية التحلية:\nملاحظات:`;
                            nextStep = "order";
                        }
                    } 
                    // --- سياسة الطلب الصارمة (كميات + أصناف) ---
                    else if (step === "order" || step === "edit_order") {
                        const hasNumbers = /\d+/.test(text);
                        const hasSalad = text.includes("سلط");
                        const hasDrink = text.includes("ببسي") || text.includes("عصير") || text.includes("ماء") || text.includes("مشروب");
                        const hasDessert = text.includes("حلى") || text.includes("تحلية") || text.includes("كيك");

                        if (!hasNumbers) {
                            response = "تنبيه: نرجو من سيادتكم تحديد (الكمية بالأرقام) لكل صنف في الطلب الموضح أعلاه لنتمكن من معالجته.";
                        } else if (!hasSalad || !hasDrink || !hasDessert) {
                            response = `سجلنا تفاصيل الوجبات، ولكن تقتضي السياسة ذكر اسم وكمية كل من (${!hasSalad ? 'السلطات، ' : ''}${!hasDrink ? 'المشروبات، ' : ''}${!hasDessert ? 'التحلية' : ''}). يرجى إكمالها الآن لسيادتكم.`;
                            setData(p => ({...p, order: text}));
                            nextStep = "check_missing";
                        } else {
                            setData(p => ({...p, order: text}));
                            response = `إليك ملخص طلب سيادتكم الموقر متضمناً الكميات:\n"${text}"\n\nهل نؤكد الطلب لسيادتكم؟ (تأكيد / تعديل)`;
                            nextStep = "finalize";
                        }
                    }
                    else if (step === "check_missing") {
                        const finalOrder = data.order + "\n" + text;
                        setData(p => ({...p, order: finalOrder}));
                        response = `تم تحديث الطلب. ملخص طلب سيادتكم النهائي هو:\n"${finalOrder}"\n\nهل نؤكد الطلب؟ (تأكيد / تعديل)`;
                        nextStep = "finalize";
                    }
                    else if (step === "finalize") {
                        if (text.includes("تأكيد") || text.includes("نعم") || text.includes("أكد") || text.includes("تم")) {
                            response = "تم إرسال طلبكم الموقر بنجاح! سيتم التواصل معكم قريباً من قبل الإدارة المختصة.\nشكراً لتواصلكم مع مطاعم الكورنيش السياحية.";
                            await fetch(API_URL, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({data: [{...data, timestamp: new Date().toLocaleString()}]})
                            });
                            nextStep = "done";
                        } else {
                            response = "تفضل بإرسال التعديل المطلوب على الأصناف أو الكميات لسيادتكم الموقرة:";
                            nextStep = "order";
                        }
                    }

                    setMessages(prev => [...prev, { role: 'bot', text: response }]);
                    setStep(nextStep);
                }, 600);
            };

            return (
                <div className="app-container">
                    <header>
                        <h1 className="text-[#0056b3] font-bold text-lg">مطاعم الكورنيش <span className="text-[#ff7f27]">VIP</span></h1>
                        <p className="text-[10px] text-gray-400 font-bold uppercase">قسم التنسيق والمتابعة</p>
                    </header>

                    <div className="chat-area">
                        {messages.map((m, i) => (
                            <div key={i} className={m.role === 'user' ? 'user-bubble' : 'bot-bubble'}>
                                {m.text.split('\n').map((l, j) => <p key={j} className="mb-0.5">{l}</p>)}
                            </div>
                        ))}
                        <div ref={chatEndRef} />
                    </div>

                    <div className="input-section">
                        <div className="input-wrapper">
                            <textarea 
                                ref={inputRef}
                                rows="1"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                placeholder="اكتب طلبك أو بياناتك هنا..."
                            />
                            <div className="send-btn" onClick={handleSend}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CornicheBot />);
    </script>
</body>
</html>
