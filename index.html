<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطاعم الكورنيش VIP - نظام التنسيق</title>
    <!-- React و Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- خط Tajawal -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0056b3;
            --primary-orange: #ff7f27;
            --whatsapp-green: #25D366;
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #f8f9fa; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14px; 
            line-height: 1.7; 
            animation: slideIn 0.3s ease-out; 
            word-wrap: break-word;
        }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .bot-msg { 
            align-self: flex-start; 
            background: #f1f5f9; 
            color: #1e293b; 
            border-bottom-right-radius: 2px; 
            border-right: 4px solid var(--primary-blue); 
        }
        .user-msg { 
            align-self: flex-end; 
            background: var(--primary-blue); 
            color: white; 
            border-bottom-left-radius: 2px; 
        }

        .app-container { 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            max-width: 500px; 
            margin: 0 auto; 
            background: #ffffff; 
            position: relative; 
            box-shadow: 0 0 40px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==================== إعدادات الواتساب ====================
        // الرقم الذي أرسلته (بدون + أو مسافات)
        const WHATSAPP_NUMBER = "967772624097"; 
        // =========================================================

        // مكون الرسالة المنفصل
        const Message = ({ role, text, whatsappLink }) => (
            <div className={`msg ${role === 'bot' ? 'bot-msg' : 'user-msg'}`}>
                {text.split('\n').map((line, j) => (
                    <p key={j} className="mb-1 last:mb-0">
                        {line.includes('http') && !line.includes('wa.me') ? (
                            <a href="https://labbayh.com" target="_blank" rel="noreferrer" className="text-white underline font-bold">
                                رابط تطبيق لبيه
                            </a>
                        ) : line}
                    </p>
                ))}
                {/* زر واتساب يظهر فقط في الرسالة النهائية */}
                {whatsappLink && (
                    <div className="mt-3 text-center">
                        <a 
                            href={whatsappLink} 
                            target="_blank" 
                            rel="noreferrer"
                            className="inline-flex items-center gap-2 bg-[#25D366] text-white px-4 py-2 rounded-full font-bold text-sm hover:bg-[#20BA5A] transition-colors shadow-md"
                        >
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                            </svg>
                            إرسال الطلب عبر واتساب
                        </a>
                    </div>
                )}
            </div>
        );

        const App = () => {
            // إعدادات API (اختياري)
            const API_URL = "https://sheetdb.io/api/v1/8ku63b4j58gja";
            const SAVE_TO_SHEET = true; // ضع false إذا أردت إرسال الواتساب فقط
            
            const [messages, setMessages] = useState([
                { role: 'bot', text: "مرحباً بكم في وحدة كبار العملاء (VIP) بمطاعم الكورنيش السياحية.\nنتشرف بخدمتكم لتنسيق أرقى المناسبات وعقود التغذية.\n\nتفضل بتزويدنا بالاسم الثنائي لسيادتكم؟" }
            ]);
            
            const [order, setOrder] = useState({
                name: "", phone: "", location: "", date: "", 
                type: "", quantity: "", details: "", timestamp: ""
            });

            const [step, setStep] = useState(1);
            const [input, setInput] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [whatsappLink, setWhatsappLink] = useState(null);
            const chatRef = useRef(null);
            const textareaRef = useRef(null);

            useEffect(() => { 
                if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
            }, [messages]);

            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 100) + 'px';
                }
            }, [input]);

            // دالة مساعدة لتحليل التاريخ
            const isDateInPast = (dateString) => {
                try {
                    const [day, month, year] = dateString.split('/').map(Number);
                    const inputDate = new Date(year, month - 1, day);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    return inputDate < today;
                } catch (e) {
                    return false;
                }
            };

            // دالة ترميز النص لرابط الواتساب
            const encodeWhatsAppText = (text) => {
                return encodeURIComponent(text);
            };

            const submitToSheet = async (finalData) => {
                setIsLoading(true);
                
                // بناء رسالة الواتساب
                const messageText = `
مرحباً، أنا ${finalData.name} أود طلب تنسيق مناسبة.

*الاسم:* ${finalData.name}
*الهاتف:* ${finalData.phone}
*الموقع:* ${finalData.location}

*قائمة الطلبات:*
${finalData.details}

*الكمية:* ${finalData.quantity}

*ملاحظات:* ${finalData.type}

*تاريخ المناسبة:* ${finalData.date}

شكراً لكم.
                `.trim();

                // إنشاء رابط الواتساب (الرقم المحدد في الأعلى)
                const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeWhatsAppText(messageText)}`;
                setWhatsappLink(waLink);

                try {
                    if (SAVE_TO_SHEET) {
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ 
                                data: [{
                                    name: finalData.name,
                                    phone: finalData.phone,
                                    location: finalData.location,
                                    date: finalData.date,
                                    type: finalData.type,
                                    quantity: finalData.quantity,
                                    details: finalData.details,
                                    timestamp: new Date().toLocaleString('ar-YE')
                                }] 
                            })
                        });
                        
                        if(!response.ok) throw new Error();
                    }

                    // رسالة البوت النهائية مع زر الواتساب
                    const finalMessage = `
✅ **تم إعداد طلبك بنجاح**

لقد قمنا بتجهيز الطلب وإرساله إلى رقم الواتساب المخصص.
يمكنك الآن مراجعة الطلب وإرساله بضغطة زر واحدة.
                    `;
                    setMessages(prev => [...prev, { role: 'bot', text: finalMessage, whatsappLink: waLink }]);
                    
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'bot', text: "حدث خطأ في حفظ البيانات، لكن يمكنك إرسال الطلب عبر الواتساب مباشرة.", whatsappLink: waLink }]);
                }
                setIsLoading(false);
                setStep(100);
            };

            const handleSend = () => {
                const text = input.trim();
                if (!text || isLoading) return;

                setMessages(prev => [...prev, { role: 'user', text }]);
                setInput("");

                setTimeout(() => {
                    let botText = "";
                    let nextStep = step;
                    let updatedOrder = { ...order };

                    switch(step) {
                        case 1: // الاسم
                            if(text.split(" ").length < 2) {
                                botText = "نرجو تزويدنا بالاسم الثنائي الموقر للمتابعة؟";
                            } else {
                                updatedOrder.name = text;
                                botText = "تشرفنا بك. يرجى تزويدنا برقم الهاتف المعتمد لسيادتكم؟";
                                nextStep = 2;
                            }
                            break;
                        case 2: // الهاتف
                            if(!/^\d{7,}$/.test(text.replace(/\s/g, ""))) {
                                botText = "يرجى كتابة رقم هاتف صحيح لنتمكن من التواصل معكم؟";
                            } else {
                                updatedOrder.phone = text;
                                botText = "نرجو تحديد موقع المناسبة بدقة (3 أركان: المدينة - الحي - الشارع/المعلم)؟\nمثال: المكلا - الشرج - مقابل البسيري";
                                nextStep = 3;
                            }
                            break;
                        case 3: // الموقع
                            const locationParts = text.split(/[-ـ\s\.]+/).filter(p => p.length > 1);
                            if(locationParts.length < 3) {
                                botText = "عذراً، يجب وصف الموقع بـ 3 أركان على الأقل (مثال: المكلا - الشرج - بجانب مدرسة...) لضمان دقة الوصول؟";
                            } else {
                                updatedOrder.location = text;
                                botText = "هل الطلب خاص بمناسبة (زواج، اجتماع، عقد تغذية) أم طلب شخصي؟";
                                nextStep = 4;
                            }
                            break;
                        case 4: // النوع
                            if(text.includes("شخصي") || text.includes("فردي")) {
                                botText = "عذراً سيد " + updatedOrder.name + "، هذا القسم مخصص للمناسبات الكبرى فقط. للطلبات الشخصية يرجى استخدام تطبيق (لبيه).\nhttps://labbayh.com";
                                setMessages(prev => [...prev, { role: 'bot', text: botText }]);
                                setStep(100);
                                return;
                            } else {
                                updatedOrder.type = text;
                                botText = "تفضل بوصف الأصناف المطلوبة (قائمة الطلبات) لمناسبتكم الموقرة؟\n(مثال: مندي دجاج - 5 افراد، مشويات ضأن - 10 افراد)";
                                nextStep = 5;
                            }
                            break;
                        case 5: // تفاصيل الطلبات
                            updatedOrder.details = text;
                            botText = "ما هي الكمية الإجمالية التقديرية (عدد الوجبات أو المعازيم)؟";
                            nextStep = 6;
                        break;
                        case 6: // الكمية
                            updatedOrder.quantity = text;
                            botText = "هل هناك ملاحظات خاصة بالطلبية؟ (مثل: عدم وجود بصل، طلب خاص للصغار...)\nإذا لا يوجد ملاحظات اكتب (لا)";
                            nextStep = 7;
                        break;
                        case 7: // الملاحظات
                            updatedOrder.details += `\nملاحظات إضافية: ${text}`;
                            botText = "يرجى تحديد تاريخ المناسبة.\nنرجو كتابته بهذا الشكل: 20/10/2026";
                            nextStep = 8;
                        break;
                        case 8: // التاريخ النهائي مع التحقق من الماضي
                            if(!text.includes("/")) {
                                botText = "يرجى كتابة التاريخ بشكل صحيح مثل النموذج: 20/10/2026";
                            } else if (isDateInPast(text)) {
                                botText = "عذراً، التاريخ الذي سجلته قد مر (من الماضي).\nيرجى إعادة كتابة التاريخ بشكل صحيح لموعد مستقبلي.";
                            } else {
                                updatedOrder.date = text;
                                setOrder(updatedOrder);
                                submitToSheet(updatedOrder);
                                return;
                            }
                        break;
                    }

                    setOrder(updatedOrder);
                    setStep(nextStep);
                    if(botText) {
                        setMessages(prev => [...prev, { role: 'bot', text: botText }]);
                    }
                }, 400);
            };

            return (
                <div className="app-container">
                    {/* شاشة التحميل */}
                    {isLoading && (
                        <div className="absolute inset-0 bg-white/90 z-50 flex flex-col items-center justify-center text-center p-5">
                            <div className="w-9 h-9 border-4 border-slate-200 border-t-[#ff7f27] rounded-full animate-spin"></div>
                            <p className="mt-4 text-blue-900 font-bold">جاري تجهيز الطلب...</p>
                        </div>
                    )}
                    
                    {/* الهيدر */}
                    <header className="bg-white p-5 text-center border-b-4 border-[#ff7f27] shadow-sm">
                        <div className="text-[#0056b3] font-extrabold text-xl">مطاعم الكورنيش السياحية</div>
                        <div className="text-[#ff7f27] text-xs font-bold mt-1 tracking-widest">وحدة كبار العملاء VIP</div>
                    </header>

                    {/* منطقة المحادثة */}
                    <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3 bg-[#fdfdfd]" ref={chatRef}>
                        {messages.map((m, i) => (
                            <Message 
                                key={i} 
                                role={m.role} 
                                text={m.text} 
                                whatsappLink={m.whatsappLink} 
                            />
                        ))}
                    </div>

                    {/* منطقة الإدخال */}
                    {step !== 100 && (
                        <div className="p-3 bg-white border-t border-gray-100 pb-[max(15px,env(safe-area-inset-bottom))]">
                            <div className="flex items-center bg-[#f1f5f9] rounded-full px-4 py-1 border-2 border-transparent focus-within:border-[#0056b3] focus-within:bg-white transition-all shadow-sm">
                                <textarea 
                                    ref={textareaRef}
                                    rows="1" 
                                    placeholder="اكتب ردكم هنا..." 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            handleSend();
                                        }
                                    }}
                                    className="flex-1 bg-transparent border-none outline-none p-2 text-[15px] text-slate-700 resize-none font-tajawal"
                                />
                                <div className="text-[#0056b3] cursor-pointer p-1.5 hover:opacity-80 transition-opacity" onClick={handleSend}>
                                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
