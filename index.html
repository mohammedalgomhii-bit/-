<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطاعم الكورنيش VIP - نظام الفلترة والطلب</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        html, body { overscroll-behavior-y: contain; margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: white; position: relative; }
        header { flex-shrink: 0; background: white; border-bottom: 2px solid #f0f0f0; padding: 15px; text-align: center; z-index: 100; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #fafafa; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
        .bot-bubble { background: white; border: 1px solid #e8e8e8; border-radius: 15px 15px 15px 2px; padding: 12px; max-width: 85%; align-self: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.03); color: #333; font-size: 14px; line-height: 1.6; border-right: 4px solid #ff7f27; }
        .user-bubble { background: #0056b3; color: white; border-radius: 15px 15px 2px 15px; padding: 12px; max-width: 85%; align-self: flex-end; font-size: 14px; }
        .input-section { padding: 10px 15px; border-top: 1px solid #eee; background: white; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        .input-wrapper { display: flex; align-items: flex-end; background: #f1f3f5; border-radius: 20px; padding: 8px 12px; border: 1px solid #e9ecef; }
        textarea { flex: 1; background: transparent; border: none; outline: none; padding: 5px 0; font-size: 16px; color: #333; resize: none; max-height: 150px; min-height: 24px; line-height: 1.5; }
        .send-btn { color: #0056b3; cursor: pointer; padding: 5px; }
        .link-text { color: #0056b3; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function CornicheBot() {
            const API_URL = "https://sheetdb.io/api/v1/8ku63b4j58gja";
            const [inputValue, setInputValue] = useState("");
            const [messages, setMessages] = useState([{ 
                role: 'bot', 
                text: "مرحباً بكم في وحدة كبار العملاء بمطاعم الكورنيش السياحية. نتشرف بخدمتكم.\n\nيرجى تزويدنا بالاسم الثنائي لسيادتكم، ورقم التواصل والموقع للبدء بالتنسيق." 
            }]);
            
            const [orderData, setOrderData] = useState({
                name: "", phone: "", location: "", date: "",
                type: "", quantity: "", details: ""
            });
            
            const [step, setStep] = useState("get_info");
            const chatEndRef = useRef(null);
            const inputRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
            useEffect(() => {
                inputRef.current.style.height = "24px";
                inputRef.current.style.height = inputRef.current.scrollHeight + "px";
            }, [inputValue]);

            const handleSend = async () => {
                const text = inputValue.trim();
                if (!text) return;
                setMessages(prev => [...prev, { role: 'user', text }]);
                setInputValue("");

                setTimeout(async () => {
                    let response = "";
                    let nextStep = step;

                    // 1. جمع البيانات الأساسية (الاسم، الرقم، الموقع)
                    if (step === "get_info") {
                        const phoneMatch = text.match(/(77|78|73)\d{7,}/);
                        const words = text.replace(/[0-9]/g, '').trim().split(/\s+/);
                        let updated = { ...orderData };
                        
                        if (phoneMatch) updated.phone = phoneMatch[0];
                        if (words.length >= 2 && !updated.name) updated.name = words.slice(0, 2).join(" ");
                        if (text.length > 5 && !phoneMatch) updated.location = text;
                        setOrderData(updated);

                        if (!updated.name) {
                            response = "نرجو من سيادتكم كتابة الاسم الثنائي الموقر (الأول والأخير).";
                        } else if (!updated.phone) {
                            response = `تشرفنا بسيادتكم يا سيد ${updated.name}. يرجى تزويدنا برقم الهاتف المعتمد.`;
                        } else if (!updated.location || updated.location.split(" ").length < 2) {
                            response = "يرجى تحديد موقع الكيان الموقر (المدينة - الحي - الشارع).";
                        } else {
                            response = "تم تسجيل بياناتكم المبدئية. نود الاستفسار من سيادتكم:\n\nهل يود الطلب بشكل شخصي دون أي مناسبة، أم أنه لمناسبة خاصة، أو لطلب تغذية مستدامة (عقود)؟";
                            nextStep = "check_purpose";
                        }
                    } 
                    // 2. فلترة الغرض من الطلب (شخصي vs مناسبات)
                    else if (step === "check_purpose") {
                        if (text.includes("شخصي") || text.includes("نفسي") || text.includes("فردي")) {
                            response = "نعتذر بشدة من سيادتكم، هذه الخدمة مخصصة حصرياً للمناسبات الكبرى وعقود التغذية المستدامة.\n\nيمكنكم إتمام طلبكم الشخصي عبر تطبيق (لبيه) من الرابط التالي:\nhttps://labbayh.com\n\nشكراً لتفهمكم.";
                            nextStep = "done";
                        } else {
                            setOrderData(p => ({ ...p, type: text }));
                            response = "يسعدنا خدمتكم في مناسبتكم. تفضل الآن بكتابة تفاصيل الطلب مع تحديد (اسم الصنف والكمية بالأرقام) لكل بند:\n\nالوجبات:\nسلطات:\nمشروبات:\nالتحلية:\nملاحظات:";
                            nextStep = "order";
                        }
                    }
                    // 3. جمع تفاصيل الطلب بالكميات
                    else if (step === "order") {
                        const quantityMatch = text.match(/\d+/);
                        if (!quantityMatch) {
                            response = "تنبيه: نرجو من سيادتكم تحديد (الكمية بالأرقام) لكل صنف في الطلب لضمان دقة التنفيذ.";
                        } else {
                            setOrderData(p => ({ ...p, details: text, quantity: "متعدد" }));
                            response = `إليك ملخص طلب سيادتكم:\n"${text}"\n\nهل نؤكد الطلب لسيادتكم؟ (تأكيد / تعديل)`;
                            nextStep = "finalize";
                        }
                    }
                    // 4. التأكيد النهائي والإرسال لقاعدة البيانات
                    else if (step === "finalize") {
                        if (text.includes("تأكيد") || text.includes("نعم") || text.includes("تم")) {
                            response = "تم إرسال طلبكم الموقر بنجاح! سيتم التواصل معكم قريباً من قبل قسم التنسيق.\nشكراً لتواصلكم مع مطاعم الكورنيش السياحية.";
                            
                            await fetch(API_URL, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({data: [{
                                    name: orderData.name,
                                    phone: orderData.phone,
                                    location: orderData.location,
                                    date: new Date().toLocaleDateString('en-GB'),
                                    type: orderData.type,
                                    quantity: orderData.quantity,
                                    details: orderData.details,
                                    timestamp: new Date().toLocaleString()
                                }]})
                            });
                            nextStep = "done";
                        } else {
                            response = "تفضل بإرسال التعديل المطلوب لسيادتكم الموقرة:";
                            nextStep = "order";
                        }
                    }

                    setMessages(prev => [...prev, { role: 'bot', text: response }]);
                    setStep(nextStep);
                }, 600);
            };

            return (
                <div className="app-container">
                    <header>
                        <h1 className="text-[#0056b3] font-bold text-lg">مطاعم الكورنيش <span className="text-[#ff7f27]">VIP</span></h1>
                        <p className="text-[10px] text-gray-400 font-bold uppercase">قسم المناسبات والعقود المستدامة</p>
                    </header>

                    <div className="chat-area">
                        {messages.map((m, i) => (
                            <div key={i} className={m.role === 'user' ? 'user-bubble' : 'bot-bubble'}>
                                {m.text.split('\n').map((l, j) => (
                                    <p key={j} className="mb-0.5">
                                        {l.includes('http') ? <a href="https://labbayh.com" target="_blank" className="link-text">{l}</a> : l}
                                    </p>
                                ))}
                            </div>
                        ))}
                        <div ref={chatEndRef} />
                    </div>

                    {step !== "done" && (
                        <div className="input-section">
                            <div className="input-wrapper">
                                <textarea 
                                    ref={inputRef}
                                    rows="1"
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    placeholder="اكتب هنا..."
                                />
                                <div className="send-btn" onClick={handleSend}>
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CornicheBot />);
    </script>
</body>
</html>
