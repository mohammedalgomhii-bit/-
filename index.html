<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطاعم الكورنيش VIP - التنسيق الذكي</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0056b3;
            --primary-orange: #ff7f27;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; margin: 0; height: 100vh; overflow: hidden; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: #ffffff; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.15); border-left: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; }
        
        .header { background: white; padding: 20px 15px; text-align: center; border-bottom: 4px solid var(--primary-orange); z-index: 20; position: relative; }
        .brand-name { color: var(--primary-blue); font-weight: 800; font-size: 1.5rem; line-height: 1.2; }
        .brand-subtitle { color: var(--primary-orange); font-size: 0.8rem; font-weight: 700; margin-top: 5px; letter-spacing: 1px; }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: #fdfdfd; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.6; animation: fadeIn 0.3s ease; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bot-msg { align-self: flex-start; background: #f0f4f8; color: #1f2937; border-bottom-right-radius: 2px; border-right: 4px solid var(--primary-blue); }
        .user-msg { align-self: flex-end; background: var(--primary-blue); color: white; border-bottom-left-radius: 2px; }

        .input-area { padding: 15px; border-top: 1px solid #eee; background: white; padding-bottom: max(15px, env(safe-area-inset-bottom)); }
        .input-wrap { display: flex; align-items: center; background: #f3f4f6; border-radius: 30px; padding: 5px 15px; border: 2px solid transparent; transition: 0.3s; }
        .input-wrap:focus-within { border-color: var(--primary-blue); background: white; }
        
        textarea { flex: 1; background: transparent; border: none; outline: none; padding: 10px 0; font-size: 15px; resize: none; max-height: 100px; font-family: inherit; }
        .send-btn { color: var(--primary-blue); cursor: pointer; padding: 5px; margin-right: 5px; }

        .loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 50; flex-direction: column; }
        .loader { width: 30px; height: 30px; border: 3px solid #f3f4f6; border-top: 3px solid var(--primary-orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const API_URL = "https://sheetdb.io/api/v1/8ku63b4j58gja";
            
            const [messages, setMessages] = useState([
                { role: 'bot', text: "مرحباً بكم في وحدة كبار العملاء (VIP) بمطاعم الكورنيش السياحية.\nنتشرف بخدمتكم لتنسيق أرقى المناسبات وعقود التغذية.\n\nتفضل بتزويدنا بالاسم الثنائي لسيادتكم؟" }
            ]);
            
            const [order, setOrder] = useState({
                name: "", phone: "", location: "", date: "", 
                type: "", quantity: "", details: "", timestamp: "", photo: "" // Photo ستبقى فارغة كما طلبت
            });

            const [step, setStep] = useState(1);
            const [input, setInput] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const chatRef = useRef(null);

            useEffect(() => { 
                if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
            }, [messages]);

            const saveData = async (finalData) => {
                setIsLoading(true);
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ data: [finalData] })
                    });
                    if(response.ok) {
                        setMessages(prev => [...prev, { role: 'bot', text: "شكراً جزيلاً لسيادتكم.\nتم تسجيل كافة البيانات في نظامنا بنجاح.\nسيتواصل معكم مختص التنسيق خلال دقائق." }]);
                    } else { throw new Error(); }
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'bot', text: "عذراً، حدث خطأ أثناء الحفظ التلقائي، سيتم التواصل معكم عبر الرقم المسجل لمتابعة الطلب." }]);
                }
                setIsLoading(false);
                setStep(100);
            };

            const handleSend = () => {
                const text = input.trim();
                if (!text || isLoading) return;

                setMessages(prev => [...prev, { role: 'user', text }]);
                setInput("");

                setTimeout(() => {
                    processStep(text);
                }, 500);
            };

            const processStep = (val) => {
                let botText = "";
                let nextStep = step;
                let currentOrder = { ...order };

                switch(step) {
                    case 1: // الاسم
                        if(val.split(" ").length < 2) {
                            botText = "نرجو كتابة الاسم الثنائي الموقر (مثال: محمد الحضرمي)؟";
                        } else {
                            currentOrder.name = val;
                            botText = "أهلاً بك. يرجى تزويدنا برقم التواصل المباشر؟";
                            nextStep = 2;
                        }
                        break;
                    case 2: // الهاتف
                        if(!/^\d{7,}$/.test(val.replace(/\s/g, ""))) {
                            botText = "يرجى إدخال رقم هاتف صحيح (7 أرقام على الأقل)؟";
                        } else {
                            currentOrder.phone = val;
                            botText = "نرجو تحديد موقع المناسبة بدقة (مثال: المكلا - الشرج - مقابل البسيري)؟";
                            nextStep = 3;
                        }
                        break;
                    case 3: // الموقع (شرط الـ 3 أجزاء)
                        const parts = val.split(/[-ـ\s]+/).filter(p => p.length > 1);
                        if(parts.length < 3) {
                            botText = "عذراً، يجب وصف الموقع بدقة (المدينة، الحي، ومعلم بارز أو شارع) لضمان الوصول؟";
                        } else {
                            currentOrder.location = val;
                            botText = "هل الطلب خاص بمناسبة كبرى/عقد تغذية مستدام، أم هو طلب شخصي فردي؟";
                            nextStep = 4;
                        }
                        break;
                    case 4: // النوع
                        if(val.includes("شخصي") || val.includes("فردي") || val.includes("نفسي")) {
                            botText = "نعتذر، هذا القسم حصري للمناسبات والعقود. للطلبات الفردية يرجى استخدام تطبيق (لبيه).\nhttps://labbayh.com";
                            setMessages(prev => [...prev, { role: 'bot', text: botText }]);
                            setStep(100);
                            return;
                        } else {
                            currentOrder.type = val;
                            botText = "نتشرف بخدمتكم. تفضل بوصف الأصناف المطلوبة (مثال: لحم مندي، بروست، سلاطات)؟";
                            nextStep = 5;
                        }
                        break;
                    case 5: // التفاصيل
                        currentOrder.details = val;
                        botText = "ما هي الكمية الإجمالية التقديرية (عدد الوجبات أو الأشخاص)؟";
                        nextStep = 6;
                        break;
                    case 6: // الكمية
                        currentOrder.quantity = val;
                        botText = "أخيراً، نرجو تحديد تاريخ وموعد المناسبة المطلوب؟";
                        nextStep = 7;
                        break;
                    case 7: // التاريخ والإرسال
                        currentOrder.date = val;
                        currentOrder.timestamp = new Date().toLocaleString('ar-YE');
                        setOrder(currentOrder);
                        saveData(currentOrder);
                        return;
                }

                setOrder(currentOrder);
                setStep(nextStep);
                if(botText) {
                    setMessages(prev => [...prev, { role: 'bot', text: botText }]);
                }
            };

            return (
                <div className="app-container">
                    {isLoading && (
                        <div className="loading-overlay">
                            <div className="loader"></div>
                            <p className="mt-2 text-sm text-blue-900 font-bold">جاري حفظ البيانات...</p>
                        </div>
                    )}
                    
                    <header className="header">
                        <div className="brand-name">مطاعم الكورنيش السياحية</div>
                        <div className="brand-subtitle">وحدة كبار العملاء VIP</div>
                    </header>

                    <div className="chat-area" ref={chatRef}>
                        {messages.map((m, i) => (
                            <div key={i} className={`msg ${m.role === 'bot' ? 'bot-msg' : 'user-msg'}`}>
                                {m.text.split('\n').map((line, j) => (
                                    <p key={j} className="mb-1">
                                        {line.includes('http') ? 
                                            <a href="https://labbayh.com" target="_blank" className="text-white underline font-bold">الرابط المباشر هنا</a> 
                                            : line}
                                    </p>
                                ))}
                            </div>
                        ))}
                    </div>

                    {step !== 100 && (
                        <div className="input-area">
                            <div className="input-wrap">
                                <textarea 
                                    rows="1" 
                                    placeholder="اكتب رد سيادتكم..." 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            handleSend();
                                        }
                                    }}
                                />
                                <div className="send-btn" onClick={handleSend}>
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
