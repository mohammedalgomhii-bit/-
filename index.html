<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطاعم الكورنيش VIP - نظام التوثيق بالصورة</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- مكتبة التقاط الشاشة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; margin: 0; height: 100vh; overflow: hidden; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: #ffffff; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
        .header { background: #1a1a1a; color: #d4af37; padding: 20px; text-align: center; border-bottom: 3px solid #d4af37; z-index: 10; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #fdfdfd; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14.5px; line-height: 1.6; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bot-msg { align-self: flex-start; background: #f0f0f0; color: #333; border-bottom-right-radius: 2px; border-right: 4px solid #d4af37; }
        .user-msg { align-self: flex-end; background: #d4af37; color: #1a1a1a; font-weight: 500; border-bottom-left-radius: 2px; }
        .input-area { padding: 15px; border-top: 1px solid #eee; background: #fff; }
        .input-wrap { display: flex; align-items: center; background: #f9f9f9; border: 1.5px solid #ddd; border-radius: 30px; padding: 5px 15px; }
        textarea { flex: 1; background: transparent; border: none; outline: none; padding: 10px 0; font-size: 15px; resize: none; max-height: 100px; }
        .send-btn { color: #d4af37; cursor: pointer; padding: 5px; }
        .loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 50; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const API_URL = "https://sheetdb.io/api/v1/8ku63b4j58gja";
            const [messages, setMessages] = useState([
                { role: 'bot', text: "مرحباً بك في وحدة VIP لمطاعم الكورنيش السياحية.\nنتشرف ببدء إجراءات التنسيق الموقرة مع سيادتكم..\n\nتفضل بتزويدنا بالاسم الثنائي لسيادتكم؟" }
            ]);
            
            const [order, setOrder] = useState({
                name: "", phone: "", location: "", date: "", 
                type: "", quantity: "", details: "", timestamp: "", photo: ""
            });

            const [step, setStep] = useState(1);
            const [input, setInput] = useState("");
            const [isFinalizing, setIsFinalizing] = useState(false);
            const chatRef = useRef(null);
            const appRef = useRef(null);

            useEffect(() => { chatRef.current?.scrollTo(0, chatRef.current.scrollHeight); }, [messages]);

            const captureAndSend = async (finalData) => {
                setIsFinalizing(true);
                try {
                    // التقاط صورة لمنطقة المحادثة
                    const canvas = await html2canvas(appRef.current);
                    const imageData = canvas.toDataURL("image/jpeg", 0.5); // ضغط الصورة لتقليل حجم النص
                    
                    const dataToSend = { ...finalData, photo: imageData };

                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ data: [dataToSend] })
                    });

                    if(response.ok) {
                        setMessages(prev => [...prev, { role: 'bot', text: "تم تسجيل طلبكم الموقر وتوثيقه بنجاح بصورة من المحادثة.\nسيتواصل معكم قسم VIP فوراً. شكراً لكم." }]);
                    } else {
                        throw new Error();
                    }
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'bot', text: "تم إرسال البيانات، ولكن حدثت مشكلة في إرفاق الصورة التوثيقية. سيتواصل معكم القسم هاتفياً." }]);
                }
                setIsFinalizing(false);
                setStep(100);
            };

            const handleSend = async () => {
                const text = input.trim();
                if (!text || isFinalizing) return;

                setMessages(prev => [...prev, { role: 'user', text }]);
                setInput("");

                setTimeout(async () => {
                    let botText = "";
                    let nextStep = step;
                    let currentOrder = { ...order };

                    switch(step) {
                        case 1: // الاسم
                            if(text.split(" ").length < 2) {
                                botText = "نرجو من سيادتكم كتابة الاسم الثنائي الموقر.";
                            } else {
                                currentOrder.name = text;
                                botText = `تشرفنا بسيادتكم سيد ${text}. يرجى تزويدنا برقم الهاتف المعتمد؟`;
                                nextStep = 2;
                            }
                            break;
                        case 2: // الهاتف
                            currentOrder.phone = text;
                            botText = "تم التدوين. نرجو تحديد موقع الكيان أو المناسبة (المدينة/الحي)؟";
                            nextStep = 3;
                            break;
                        case 3: // الموقع
                            currentOrder.location = text;
                            botText = "هل الطلب خاص بمناسبة كبرى/عقود، أم هو طلب شخصي فردي؟";
                            nextStep = 4;
                            break;
                        case 4: // النوع
                            if(text.includes("شخصي") || text.includes("فردي")) {
                                botText = "عذراً سيادتكم، هذا القسم حصري للمناسبات والعقود. للطلبات الشخصية يرجى استخدام تطبيق (لبيه).";
                                nextStep = 100;
                            } else {
                                currentOrder.type = text;
                                botText = "نتشرف بخدمتكم. ما هي تفاصيل الأصناف المطلوبة؟";
                                nextStep = 5;
                            }
                            break;
                        case 5: // التفاصيل
                            currentOrder.details = text;
                            botText = "ما هي الكمية الإجمالية المطلوبة لسيادتكم؟";
                            nextStep = 6;
                            break;
                        case 6: // الكمية
                            currentOrder.quantity = text;
                            botText = "حفظاً لمواعيد سيادتكم، نرجو تحديد (تاريخ وموعد) المناسبة المطلوب؟";
                            nextStep = 7;
                            break;
                        case 7: // التاريخ النهائي
                            currentOrder.date = text;
                            currentOrder.timestamp = new Date().toLocaleString('ar-YE');
                            setOrder(currentOrder);
                            setMessages(prev => [...prev, { role: 'bot', text: "جاري توثيق المحادثة وإرسال الطلب النهائي..." }]);
                            captureAndSend(currentOrder); // استدعاء التقاط الصورة والإرسال
                            return;
                    }

                    setOrder(currentOrder);
                    setStep(nextStep);
                    if(nextStep !== 100) setMessages(prev => [...prev, { role: 'bot', text: botText }]);
                }, 600);
            };

            return (
                <div className="app-container" ref={appRef}>
                    {isFinalizing && (
                        <div className="loading-overlay">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-600"></div>
                            <span className="font-bold text-amber-800">جاري توثيق الطلب...</span>
                        </div>
                    )}
                    <div className="header">
                        <div className="font-bold text-lg tracking-widest">CORNICHE <span className="text-white">VIP</span></div>
                        <div className="text-[9px] opacity-80 uppercase tracking-widest mt-1">Elite Catering Systems</div>
                    </div>

                    <div className="chat-area" ref={chatRef}>
                        {messages.map((m, i) => (
                            <div key={i} className={`msg ${m.role === 'bot' ? 'bot-msg' : 'user-msg'}`}>
                                {m.text.split('\n').map((line, j) => (
                                    <p key={j}>{line}</p>
                                ))}
                            </div>
                        ))}
                    </div>

                    {step !== 100 && (
                        <div className="input-area">
                            <div className="input-wrap">
                                <textarea 
                                    rows="1" 
                                    placeholder="اكتب رد سيادتكم..." 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}
                                />
                                <div className="send-btn" onClick={handleSend}>
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
