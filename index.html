<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطاعم الكورنيش VIP - النظام الصارم</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #fcfcfc; margin: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        .app-container { height: 100%; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; background: white; width: 100%; position: relative; border-left: 1px solid #eee; border-right: 1px solid #eee; }
        header { flex-shrink: 0; background: white; border-bottom: 2px solid #f8f8f8; padding: 15px; text-align: center; z-index: 100; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #fafafa; display: flex; flex-direction: column; gap: 12px; }
        .bot-bubble { background: white; border: 1px solid #f0f0f0; border-radius: 15px 15px 15px 2px; padding: 12px; max-width: 85%; align-self: flex-start; box-shadow: 4px 4px 15px rgba(0,0,0,0.02); color: #333; font-size: 14px; line-height: 1.6; border-right: 4px solid #ff7f27; }
        .user-bubble { background: #0056b3; color: white; border-radius: 15px 15px 2px 15px; padding: 12px; max-width: 85%; align-self: flex-end; font-size: 14px; box-shadow: 0 4px 12px rgba(0,86,179,0.15); }
        .input-section { padding: 10px 15px; border-top: 1px solid #eee; background: white; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        .input-wrapper { display: flex; align-items: flex-end; background: #f1f3f5; border-radius: 20px; padding: 8px 12px; border: 1px solid #e9ecef; }
        textarea { flex: 1; background: transparent; border: none; outline: none; padding: 5px 0; font-size: 16px; color: #333; resize: none; max-height: 150px; min-height: 24px; line-height: 1.5; text-align: right; }
        .send-btn { color: #0056b3; cursor: pointer; padding: 5px; margin-right: 5px; transition: 0.2s; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function CornicheBot() {
            const API_URL = "https://sheetdb.io/api/v1/8ku63b4j58gja";
            const [inputValue, setInputValue] = useState("");
            const [messages, setMessages] = useState([{ 
                role: 'bot', 
                text: "مرحباً بكم في وحدة كبار العملاء بمطاعم الكورنيش السياحية. نتشرف بخدمتكم.\n\nيرجى تزويدنا بالاسم الثنائي لسيادتكم، ورقم التواصل والموقع للبدء بالتنسيق." 
            }]);
            
            // هيكلة البيانات لتطابق صورة قاعدة البيانات
            const [data, setData] = useState({ 
                name: "", phone: "", location: "", date: "", 
                type: "", quantity: "", details: "" 
            });
            const [step, setStep] = useState("get_info");
            const chatEndRef = useRef(null);
            const inputRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
            useEffect(() => {
                inputRef.current.style.height = "24px";
                inputRef.current.style.height = inputRef.current.scrollHeight + "px";
            }, [inputValue]);

            const handleSend = async () => {
                const text = inputValue.trim();
                if (!text) return;
                setMessages(prev => [...prev, { role: 'user', text }]);
                setInputValue("");

                setTimeout(async () => {
                    let response = "";
                    let nextStep = step;

                    // 1. سياسة عدم التجاوز في جمع البيانات الأساسية
                    if (step === "get_info") {
                        const phoneMatch = text.match(/(77|78|73)\d{7,}/);
                        const words = text.replace(/[0-9]/g, '').trim().split(/\s+/);
                        let updated = { ...data };
                        
                        if (phoneMatch) updated.phone = phoneMatch[0];
                        if (words.length >= 2 && !updated.name) updated.name = words.slice(0, 2).join(" ");
                        if (text.length > 5 && !phoneMatch) updated.location = text;
                        setData(updated);

                        if (!updated.name) {
                            response = "نرجو من سيادتكم كتابة الاسم الثنائي الموقر (الأول والأخير) لضمان جودة الخدمة لسيادتكم.";
                        } else if (!updated.phone) {
                            response = `أهلاً بك يا سيد ${updated.name}. يرجى تزويدنا برقم الهاتف (77، 78، أو 73).`;
                        } else if (!updated.location || updated.location.split(" ").length < 2) {
                            response = "يرجى تحديد موقع الكيان الموقر بدقة (المدينة - الحي - الشارع).";
                        } else {
                            response = "تم استلام تفاصيلكم بنجاح. تفضل الآن بكتابة طلبكم مع تحديد النوع والكمية (رقم) بدقة لكل بند:\n\nالوجبة 1:\nكمية الوجبة 1:\nوجبة 2:\nكمية وجبة 2:\nسلطات (الاسم):\nكمية السلطات:\nالمشروبات (الاسم):\nكمية المشروبات:\nالتحلية (الاسم):\nكمية التحلية:\nملاحظات:";
                            nextStep = "order";
                        }
                    } 
                    // 2. سياسة الطلب الصارمة (أسماء صريحة + كميات بالأرقام)
                    else if (step === "order" || step === "edit_order") {
                        const hasNumbers = /\d+/.test(text);
                        const hasSalad = text.includes("سلط");
                        const hasDrink = text.includes("ببسي") || text.includes("عصير") || text.includes("ماء") || text.includes("مشروب");
                        const hasDessert = text.includes("حلى") || text.includes("تحلية") || text.includes("كيك");

                        if (!hasNumbers) {
                            response = "تنبيه: يجب كتابة الكمية بالأرقام بجانب كل صنف لضمان دقة التنفيذ لسيادتكم.";
                        } else if (!hasSalad || !hasDrink || !hasDessert) {
                            response = `يرجى إكمال الطلب بذكر اسم وكمية (${!hasSalad ? 'السلطات، ' : ''}${!hasDrink ? 'المشروبات، ' : ''}${!hasDessert ? 'التحلية' : ''}). لا يتم قبول الطلبات الناقصة.`;
                            setData(p => ({...p, details: text}));
                            nextStep = "check_missing";
                        } else {
                            setData(p => ({...p, details: text, type: "طلب متكامل", quantity: "متعدد"}));
                            response = `إليك ملخص طلب سيادتكم الموقر بالكميات:\n"${text}"\n\nهل نؤكد الطلب لسيادتكم؟ (تأكيد / تعديل)`;
                            nextStep = "finalize";
                        }
                    }
                    else if (step === "check_missing") {
                        const finalDetails = data.details + "\n" + text;
                        setData(p => ({...p, details: finalDetails, type: "طلب محدث", quantity: "متعدد"}));
                        response = `تم تحديث الطلب. الطلب النهائي لسيادتكم هو:\n"${finalDetails}"\n\nهل نؤكد الطلب؟ (تأكيد / تعديل)`;
                        nextStep = "finalize";
                    }
                    else if (step === "finalize") {
                        if (text.includes("تأكيد") || text.includes("نعم") || text.includes("تم")) {
                            response = "تم إرسال طلبكم الموقر بنجاح! سيتم التواصل معكم قريباً.\nشكراً لتواصلكم مع مطاعم الكورنيش السياحية.";
                            
                            // إرسال البيانات وفق أعمدة الصورة
                            await fetch(API_URL, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({data: [{
                                    name: data.name,
                                    phone: data.phone,
                                    location: data.location,
                                    date: new Date().toLocaleDateString('en-GB'),
                                    type: data.type,
                                    quantity: data.quantity,
                                    details: data.details,
                                    timestamp: new Date().toLocaleString()
                                }]})
                            });
                            nextStep = "done";
                        } else {
                            response = "تفضل بإرسال التعديل المطلوب على الأصناف أو الكميات لسيادتكم:";
                            nextStep = "order";
                        }
                    }

                    setMessages(prev => [...prev, { role: 'bot', text: response }]);
                    setStep(nextStep);
                }, 600);
            };

            return (
                <div className="app-container">
                    <header>
                        <h1 className="text-[#0056b3] font-bold text-lg">مطاعم الكورنيش <span className="text-[#ff7f27]">VIP</span></h1>
                        <p className="text-[10px] text-gray-400 font-bold uppercase">قسم التنسيق والمتابعة</p>
                    </header>

                    <div className="chat-area">
                        {messages.map((m, i) => (
                            <div key={i} className={m.role === 'user' ? 'user-bubble' : 'bot-bubble'}>
                                {m.text.split('\n').map((l, j) => <p key={j} className="mb-0.5">{l}</p>)}
                            </div>
                        ))}
                        <div ref={chatEndRef} />
                    </div>

                    <div className="input-section">
                        <div className="input-wrapper">
                            <textarea ref={inputRef} rows="1" value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="اكتب هنا..." />
                            <div className="send-btn" onClick={handleSend}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CornicheBot />);
    </script>
</body>
</html>
