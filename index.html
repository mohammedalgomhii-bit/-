<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة العملاء VIP - مطاعم الكورنيش</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* هوية الألوان: كريمي، ذهبي، وأسود كربوني دافئ */
        :root {
            --cream-white: #FCFBF9;
            --soft-gold: #C5A059;
            --carbon-black: #1A1A1A;
            --soft-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #F4F1ED; /* خلفية كريمية دافئة مريحة */
            height: 100vh;
            margin: 0;
        }

        /* حاوية بتصميم ناعم وظلال خافتة */
        .vip-container {
            background: var(--cream-white);
            border-radius: 35px;
            box-shadow: var(--soft-shadow);
            border: 1px solid rgba(197, 160, 89, 0.1);
            overflow: hidden;
        }

        /* الهيدر: أسود كربوني مع تدرج ذهبي خفيف */
        .vip-header {
            background: linear-gradient(135deg, #1A1A1A 0%, #2D2D2D 100%);
            border-bottom: 2px solid var(--soft-gold);
        }

        .gold-accent { color: var(--soft-gold); }

        /* فقاعات المحادثة بظلال ناعمة */
        .bot-bubble {
            background: #FFFFFF;
            border: 1px solid #EAEAEA;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            color: var(--carbon-black);
        }

        .user-bubble {
            background: var(--carbon-black);
            color: #FFFFFF;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: var(--soft-gold); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function CornicheApp() {
            const [input, setInput] = useState("");
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'أهلاً بك في خدمة VIP لمطاعم الكورنيش. نحن هنا لخدمتكم بخصوصية تامة وأسلوب راقٍ.' }
            ]);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleSend = () => {
                const text = input.trim();
                if (!text) return;

                setMessages(prev => [...prev, { role: 'user', text: text }]);
                setInput("");

                // تحليل الدلائل السياقية (بناءً على طلبك السابق)
                let reply = "نسعد بخدمتكم؛ تم استلام طلبكم وسيتم التعامل معه بأعلى مستويات الجودة.";
                const lowText = text.toLowerCase();

                if (lowText.includes("بكرة") || lowText.includes("غدا")) reply = "تمت الجدولة ليوم غدٍ كما طلبت، نعدكم بالدقة في الموعد.";
                if (lowText.includes("وجبة واحدة")) reply = "بكل سرور، سنقوم بتنفيذ طلبك الفردي فوراً بلمستنا الخاصة.";
                if (lowText.includes("ذوقكم") || lowText.includes("شي خفيف")) reply = "اختيار موفق؛ سأقوم باختيار الطبق المفضل لدى روادنا الـ VIP ليكون مفاجأة ذوقية لكم.";
                if (lowText.includes("ما قصرتوا") || lowText.includes("شكرا")) reply = "هذا واجبنا وفخر لنا؛ ننتظر تشريفكم لنا دائماً.";

                setTimeout(() => {
                    setMessages(prev => [...prev, { role: 'bot', text: reply }]);
                }, 600);
            };

            return (
                <div className="w-full max-w-2xl mx-auto h-screen flex flex-col p-6">
                    <div className="flex-1 vip-container flex flex-col">
                        
                        {/* الهيدر المتوافق مع الهوية */}
                        <header className="vip-header px-8 py-6 text-white flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-bold tracking-wide">مطاعم الكورنيش <span className="gold-accent">VIP</span></h1>
                                <p className="text-[10px] opacity-60">نظام الرد الذكي المحدث</p>
                            </div>
                            <div className="text-2xl">✨</div>
                        </header>

                        {/* منطقة الحوار بظلال وتدرجات خافتة */}
                        <div className="flex-1 overflow-y-auto p-8 space-y-6 chat-scroll bg-[#FAF9F6]">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[85%] p-5 rounded-[24px] text-[15px] leading-relaxed ${
                                        m.role === 'user' ? 'user-bubble rounded-bl-none' : 'bot-bubble rounded-br-none'
                                    }`}>
                                        {m.text}
                                    </div>
                                </div>
                            ))}
                            <div ref={chatEndRef} />
                        </div>

                        {/* الإدخال النصي حصراً بدون ميكروفون */}
                        <div className="p-8 bg-white border-t border-gray-100">
                            <div className="relative flex items-center gap-3">
                                <input 
                                    type="text" 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="أدخل رسالتك هنا..."
                                    className="flex-1 p-5 bg-[#FDFDFD] border border-gray-200 rounded-2xl outline-none focus:border-[#C5A059] transition-all shadow-sm"
                                    onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                />
                                <button 
                                    onClick={handleSend}
                                    className="p-5 bg-[#1A1A1A] text-[#C5A059] rounded-2xl hover:bg-black transition-colors shadow-lg"
                                >
                                    ➤
                                </button>
                            </div>
                            <p className="text-center text-[9px] text-gray-400 mt-3">نظام الرد الآلي المطور - مطاعم الكورنيش السياحية</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CornicheApp />);
    </script>
</body>
</html>
